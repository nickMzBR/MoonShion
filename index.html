<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>MoonStrikes</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#222;--bg2:#2a2a2a;--bg3:#333;--bd:#3a3a3a;
  --blue:#4a8fe2;--blue2:#6aaaf5;--blue3:#2d68b5;
  --green:#4caf7d;--red:#e05050;--yellow:#f0c040;
  --tx:#e8e8e8;--tx2:#888;
  --f:'Orbitron',sans-serif;--u:'Inter',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--u)}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0}
.screen.active{display:flex}

/* ── AUTH ── */
#AS{flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 35%,#253450 0%,#222 70%)}
.stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
  animation:tw var(--d,3s) infinite var(--dl,0s)}
@keyframes tw{0%,100%{opacity:.25}50%{opacity:.85}}
.card{position:relative;z-index:1;background:#272727;border:1px solid var(--bd);border-radius:10px;
  border-top:3px solid var(--blue);padding:36px 32px;width:340px;
  box-shadow:0 16px 50px rgba(0,0,0,.65),0 0 30px rgba(74,144,226,.07)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-family:var(--f);font-size:22px;font-weight:900;letter-spacing:5px;color:#fff}
.logo h1 b{color:var(--blue)}
.logo p{font-size:9px;letter-spacing:3px;color:var(--tx2);margin-top:5px;font-family:var(--f)}
.tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;
  letter-spacing:1px;color:var(--tx2);border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tc{display:none}.tc.on{display:block}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:10px;letter-spacing:1px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase}
.fld input{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);padding:10px 12px;font-size:13px;outline:none;transition:border-color .2s;font-family:var(--u)}
.fld input:focus{border-color:var(--blue)}
.btn{width:100%;padding:11px;background:var(--blue);color:#fff;border-radius:6px;
  font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  border:none;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;margin-top:5px}
.btn:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(74,144,226,.4)}
.btn:active{transform:translateY(0)}
.btn:disabled{background:var(--bg3);color:var(--tx2);cursor:not-allowed;transform:none;box-shadow:none}
.aerr{color:var(--red);font-size:11px;margin-top:8px;text-align:center;min-height:15px}

/* ── LOBBY ── */
#LS{flex-direction:column;background:var(--bg)}
.lhdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
.llogo{font-family:var(--f);font-size:13px;font-weight:900;letter-spacing:4px;color:#fff}
.llogo b{color:var(--blue)}
.hr{display:flex;align-items:center;gap:12px}
.av{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:2px solid var(--blue);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--blue)}
.sbtn{background:transparent;border:1px solid var(--bd);border-radius:5px;color:var(--tx2);
  padding:5px 11px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.sbtn:hover{border-color:var(--red);color:var(--red)}
.lbody{display:flex;flex:1;overflow:hidden}
.lmain{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
.rcard{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  border-top:3px solid var(--blue);padding:24px 40px;text-align:center;width:280px;
  box-shadow:0 4px 18px rgba(0,0,0,.4)}
.rlbl{font-size:9px;letter-spacing:2px;color:var(--tx2);text-transform:uppercase;font-family:var(--f)}
.rnum{font-family:var(--f);font-size:48px;font-weight:900;color:var(--blue);line-height:1.1;margin:7px 0}
.rnm{font-size:12px;color:var(--green);font-weight:600}
.pbtn{width:280px;padding:14px;background:var(--blue);color:#fff;border-radius:7px;
  font-family:var(--f);font-size:13px;font-weight:700;letter-spacing:3px;border:none;cursor:pointer;
  transition:all .22s;box-shadow:0 4px 16px rgba(74,144,226,.3)}
.pbtn:hover{background:var(--blue2);box-shadow:0 6px 22px rgba(74,144,226,.45);transform:translateY(-2px)}
.pbtn:disabled{background:var(--bg3);color:var(--tx2);cursor:not-allowed;box-shadow:none;transform:none}
.srow{display:none;align-items:center;gap:10px;font-size:12px;color:var(--tx2)}
.srow.on{display:flex}
.dot{width:8px;height:8px;background:var(--blue);border-radius:50%;animation:pd 1s infinite}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.5)}}
.xbtn{background:transparent;border:1px solid var(--bd);border-radius:4px;color:var(--tx2);
  padding:4px 10px;font-size:11px;cursor:pointer;transition:all .2s}
.xbtn:hover{border-color:var(--red);color:var(--red)}
.lside{width:268px;border-left:1px solid var(--bd);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.sttl{padding:12px 17px;border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;
  letter-spacing:2px;color:var(--tx2);text-transform:uppercase;display:flex;align-items:center;gap:7px;font-family:var(--f)}
.sttl::before{content:'';width:3px;height:11px;background:var(--blue);border-radius:2px;display:inline-block}
.lbl{flex:1;overflow-y:auto;padding:3px 0}
.lbl::-webkit-scrollbar{width:3px}
.lbl::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.lbr{display:flex;align-items:center;gap:9px;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.025);transition:background .15s}
.lbr:hover{background:rgba(255,255,255,.018)}
.lbr.me{background:rgba(74,144,226,.06);border-left:2px solid var(--blue);padding-left:14px}
.lbp{font-size:10px;font-weight:700;color:var(--tx2);width:20px;text-align:center}
.lbp.g{color:#ffd700}.lbp.s{color:#c0c0c0}.lbp.b{color:#cd7f32}
.lbn{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbt{font-size:12px;color:var(--blue);font-weight:700}

/* ── GAME ── */
#GS{background:#111722;align-items:center;justify-content:center}
#gc{display:block;cursor:none;touch-action:none}
.hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
.htop{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 14px}
.hc{background:rgba(15,20,32,.9);border:1px solid rgba(74,144,226,.18);border-radius:8px;padding:8px 12px;min-width:138px;backdrop-filter:blur(4px)}
.hpn{font-size:9px;letter-spacing:1px;color:var(--tx2);text-transform:uppercase}
.hbw{width:112px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:5px}
.hb{height:100%;border-radius:2px;background:var(--green);transition:width .1s,background .3s}
.hhp{font-size:16px;font-weight:700;color:#fff;margin-top:3px;font-family:var(--f)}
.hsc{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(15,20,32,.92);border:1px solid rgba(74,144,226,.18);border-radius:9px;
  border-top:2px solid var(--blue);padding:7px 20px;display:flex;align-items:center;gap:13px;backdrop-filter:blur(4px)}
.hk{font-family:var(--f);font-size:24px;font-weight:900;text-align:center;min-width:22px}
.hk.m{color:var(--green)}.hk.e{color:var(--red)}
.hks{font-size:12px;color:var(--tx2)}
.hkl{font-size:9px;color:var(--tx2);text-align:center;letter-spacing:1px}
.ham{position:absolute;bottom:14px;right:14px;background:rgba(15,20,32,.9);
  border:1px solid rgba(74,144,226,.18);border-radius:8px;padding:8px 12px;text-align:right;backdrop-filter:blur(4px)}
.hwn{font-size:9px;color:var(--blue);letter-spacing:1px;margin-bottom:2px;font-family:var(--f)}
.han{font-family:var(--f);font-size:24px;font-weight:700;color:#fff}
.hal{font-size:9px;color:var(--tx2)}
.hrl{font-size:10px;color:var(--yellow);animation:blink .5s infinite;display:none;font-family:var(--f)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.crs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:20}
.cx{position:absolute;background:rgba(255,255,255,.8)}
.cx-t{width:2px;height:8px;top:-13px;left:-1px}
.cx-b{width:2px;height:8px;top:5px;left:-1px}
.cx-l{width:8px;height:2px;top:-1px;left:-13px}
.cx-r{width:8px;height:2px;top:-1px;left:5px}
.cx-d{width:2px;height:2px;top:-1px;left:-1px}

/* ── OVERLAYS ── */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
.ov.on{display:flex}
.ovb{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;border-top:3px solid var(--blue);
  padding:36px;text-align:center;min-width:290px;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.ovt{font-family:var(--f);font-size:26px;font-weight:900;letter-spacing:3px;margin-bottom:7px}
.ovt.win{color:var(--green)}.ovt.lose{color:var(--red)}
.ovs{font-size:11px;color:var(--tx2);letter-spacing:1px;margin-bottom:13px}
.ovtr{font-size:16px;color:var(--yellow);font-weight:700;margin-bottom:24px;font-family:var(--f)}
.wb{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;border-top:3px solid var(--blue);
  padding:36px;text-align:center;min-width:290px}
.wt{font-family:var(--f);font-size:14px;font-weight:700;color:var(--blue);letter-spacing:2px;margin-bottom:8px}
.ws{font-size:10px;color:var(--tx2);margin-bottom:5px}
.spin{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE ── */
#mbc{display:none;position:absolute;inset:0;pointer-events:none;z-index:30}
@media(pointer:coarse){#mbc{display:block}.crs{display:none}#gc{cursor:default}}
#jz{position:absolute;bottom:18px;left:18px;width:128px;height:128px;pointer-events:all}
#jbase{position:absolute;inset:0;border-radius:50%;background:rgba(74,144,226,.07);border:2px solid rgba(74,144,226,.22)}
#jknob{position:absolute;width:48px;height:48px;border-radius:50%;left:50%;top:50%;
  transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 35%,rgba(74,144,226,.5),rgba(74,144,226,.18));
  border:2px solid rgba(74,144,226,.55)}
#sz{position:absolute;bottom:18px;right:18px;width:146px;height:146px;pointer-events:all}
#sbase{position:absolute;inset:0;border-radius:50%;background:rgba(226,80,80,.07);border:2px solid rgba(226,80,80,.22)}
#sknob{position:absolute;width:55px;height:55px;border-radius:50%;left:50%;top:50%;
  transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 35%,rgba(226,100,80,.55),rgba(200,40,40,.35));
  border:2px solid rgba(226,100,80,.6);display:flex;align-items:center;justify-content:center;font-size:19px}
#rbtn{position:absolute;bottom:94px;right:180px;width:44px;height:44px;border-radius:50%;pointer-events:all;
  background:rgba(74,144,226,.1);border:2px solid rgba(74,144,226,.38);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
  font-size:8px;color:var(--blue);font-weight:700;text-transform:uppercase}
#rbtn .ic{font-size:16px;line-height:1}
#mpips{position:absolute;bottom:176px;right:18px;display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;max-width:146px;pointer-events:none}
.pip{width:6px;height:12px;border-radius:2px;background:rgba(255,255,255,.7)}
.pip.e{background:rgba(255,255,255,.1)}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg3);
  border:1px solid var(--bd);border-left:3px solid var(--blue);border-radius:6px;
  padding:8px 16px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>

<!-- AUTH -->
<div id="AS" class="screen active">
  <div class="stars" id="starsEl"></div>
  <div class="card">
    <div class="logo">
      <h1>MOON<b>STRIKES</b></h1>
      <p>2D TACTICAL · MULTIPLAYER</p>
    </div>
    <div class="tabs">
      <div class="tab on" onclick="switchTab('login')">Entrar</div>
      <div class="tab"    onclick="switchTab('register')">Cadastrar</div>
    </div>
    <!-- LOGIN -->
    <div id="tLogin" class="tc on">
      <div class="fld"><label>Nickname</label><input id="lNick" type="text" placeholder="SeuNick" autocomplete="username"/></div>
      <div class="fld"><label>Senha</label><input id="lPass" type="password" placeholder="••••••••"/></div>
      <button class="btn" id="lBtn" onclick="doLogin()">ENTRAR</button>
      <div class="aerr" id="lErr"></div>
    </div>
    <!-- REGISTER -->
    <div id="tReg" class="tc">
      <div class="fld"><label>Nickname</label><input id="rNick" type="text" placeholder="SeuNick" maxlength="16"/></div>
      <div class="fld"><label>Senha</label><input id="rPass" type="password" placeholder="mín. 6 caracteres"/></div>
      <button class="btn" id="rBtn" onclick="doRegister()">CRIAR CONTA</button>
      <div class="aerr" id="rErr"></div>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="LS" class="screen">
  <div class="lhdr">
    <div class="llogo">MOON<b>STRIKES</b></div>
    <div class="hr">
      <div class="av" id="hAv">?</div>
      <div>
        <div style="font-size:13px;font-weight:600" id="hNick">—</div>
        <div style="font-size:11px;color:var(--blue)">🏆 <span id="hTr">0</span></div>
      </div>
      <button class="sbtn" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="lbody">
    <div class="lmain">
      <div class="rcard">
        <div class="rlbl">Troféus</div>
        <div class="rnum" id="myTr">0</div>
        <div class="rnm" id="myRnk">Recruta</div>
      </div>
      <button class="pbtn" id="playBtn" onclick="startSearch()">▶ JOGAR</button>
      <div class="srow" id="srow">
        <div class="dot"></div>
        <span>Procurando partida...</span>
        <button class="xbtn" onclick="cancelSearch()">Cancelar</button>
      </div>
    </div>
    <div class="lside">
      <div class="sttl">Top Global</div>
      <div class="lbl" id="lbList"></div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="GS" class="screen">
  <canvas id="gc"></canvas>
  <div class="hud">
    <div class="htop">
      <div class="hc">
        <div class="hpn" id="hMyN">EU</div>
        <div class="hbw"><div class="hb" id="hMyB" style="width:100%"></div></div>
        <div class="hhp">❤ <span id="hMyH">100</span></div>
      </div>
      <div class="hc" style="text-align:right">
        <div class="hpn" id="hEnN">INIMIGO</div>
        <div class="hbw"><div class="hb" id="hEnB" style="width:100%;background:var(--red)"></div></div>
        <div class="hhp" style="text-align:right">❤ <span id="hEnH">100</span></div>
      </div>
    </div>
    <div class="hsc">
      <div><div class="hk m" id="hMyK">0</div><div class="hkl">KILLS</div></div>
      <div class="hks">:</div>
      <div><div class="hk e" id="hEnK">0</div><div class="hkl">/ 3</div></div>
    </div>
    <div class="ham">
      <div class="hwn">PISTOLA</div>
      <div class="han" id="hAm">12</div>
      <div class="hal">/ 12</div>
      <div class="hrl" id="hRl">RECARREGANDO</div>
    </div>
  </div>
  <div class="crs">
    <div class="cx cx-t"></div><div class="cx cx-b"></div>
    <div class="cx cx-l"></div><div class="cx cx-r"></div>
    <div class="cx cx-d"></div>
  </div>
  <div class="ov" id="wOv">
    <div class="wb">
      <div class="spin"></div>
      <div class="wt">AGUARDANDO INIMIGO</div>
      <div class="ws" id="wId"></div>
      <div class="ws">A partida começa quando o oponente entrar</div>
    </div>
  </div>
  <div class="ov" id="eOv">
    <div class="ovb">
      <div class="ovt" id="eT">—</div>
      <div class="ovs" id="eS">—</div>
      <div class="ovtr" id="eTr"></div>
      <button class="btn" style="margin-top:0" onclick="backToLobby()">VOLTAR AO LOBBY</button>
    </div>
  </div>
  <div id="mbc">
    <div id="jz"><div id="jbase"></div><div id="jknob"></div></div>
    <div id="sz"><div id="sbase"></div><div id="sknob">🔴</div></div>
    <div id="rbtn" ontouchstart="mobileReload()"><span class="ic">↺</span><span>R</span></div>
    <div id="mpips"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue,off,push,update,remove}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase config ──

// ── Stars ──

    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;`
      +`--d:${(2+Math.random()*4).toFixed(1)}s;--dl:${(Math.random()*4).toFixed(1)}s;`
      +`opacity:${(.15+Math.random()*.5).toFixed(2)}`;

  }

// ── SHA-256 ──
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Session ──
let ME=null; // {uid, nickname, trophies}

// ── Constants ──
const MW=1200,MH=700,PR=13,BR=4,BS=9;
const MAX_HP=100,MAX_AMMO=12,RELOAD_MS=1600,KILLS_WIN=3,TROPHY_WIN=30,RANGE=300;
const SPAWNS={p1:{x:72,y:350},p2:{x:MW-72,y:350}};

// ── Map ──
const WALLS=[
  // borders
  {x:0,y:0,w:MW,h:18},{x:0,y:MH-18,w:MW,h:18},

  {x:506,y:262,w:188,h:22},
  {x:506,y:416,w:188,h:22},
  {x:506,y:262,w:22,h:176},
  {x:672,y:262,w:22,h:176},
  // left pillars
  {x:126,y:152,w:22,h:108},{x:126,y:440,w:22,h:108},
  // right pillars
  {x:MW-148,y:152,w:22,h:108},{x:MW-148,y:440,w:22,h:108},
  // mid-left barriers
  {x:293,y:190,w:110,h:20},{x:293,y:490,w:110,h:20},
  // mid-right barriers
  {x:797,y:190,w:110,h:20},{x:797,y:490,w:110,h:20},

// ── Auth ──
window.doLogin=async function(){
  const nick=document.getElementById('lNick').value.trim();
  const pass=document.getElementById('lPass').value;
  setErr('lErr','');
  if(!nick||!pass){setErr('lErr','Preencha todos os campos.');return;}
  const btn=document.getElementById('lBtn');
  btn.disabled=true;btn.textContent='ENTRANDO...';
  try{
    const snap=await get(ref(db,'users/'+nick.toLowerCase()));
    if(!snap.exists()){setErr('lErr','Usuário não encontrado.');return;}
    const data=snap.val();
    const hash=await sha256(pass);
    if(hash!==data.passwordHash){setErr('lErr','Senha incorreta.');return;}
    ME={uid:nick.toLowerCase(),nickname:data.nickname,trophies:data.trophies||0};
    localStorage.setItem('ms_session',JSON.stringify(ME));
    enterLobby();
  }catch(err){
    setErr('lErr','Erro de conexão. Verifique as regras do Firebase.');
    console.error(err);
  }finally{
    btn.disabled=false;btn.textContent='ENTRAR';
  }
};

window.doRegister=async function(){
  const nick=document.getElementById('rNick').value.trim();
  const pass=document.getElementById('rPass').value;
  setErr('rErr','');
  if(nick.length<2){setErr('rErr','Nickname muito curto (mín. 2).');return;}
  if(!/^[a-zA-Z0-9_]+$/.test(nick)){setErr('rErr','Só letras, números e _.');return;}
  if(pass.length<6){setErr('rErr','Senha muito curta (mín. 6).');return;}
  const btn=document.getElementById('rBtn');
  btn.disabled=true;btn.textContent='CRIANDO...';
  try{
    const uid=nick.toLowerCase();
    const snap=await get(ref(db,'users/'+uid));
    if(snap.exists()){setErr('rErr','Nickname já em uso.');return;}
    const hash=await sha256(pass);
    await set(ref(db,'users/'+uid),{
      nickname:nick,
      passwordHash:hash,
      trophies:0,
      wins:0,
      losses:0,
      createdAt:Date.now()
    });
    ME={uid:uid,nickname:nick,trophies:0};
    localStorage.setItem('ms_session',JSON.stringify(ME));
    enterLobby();
  }catch(err){
    setErr('rErr','Erro de conexão. Verifique as regras do Firebase.');
    console.error(err);
  }finally{
    btn.disabled=false;btn.textContent='CRIAR CONTA';
  }
};

window.doLogout=function(){
  localStorage.removeItem('ms_session');
  ME=null;
  cancelSearch();
  showScreen('AS');
};

// ── Matchmaking ──
window.startSearch=async function(){
  document.getElementById('playBtn').disabled=true;
  document.getElementById('srow').classList.add('on');
  try{
    const qSnap=await get(ref(db,'queue'));
    if(qSnap.exists()){
      let open=null;
      qSnap.forEach(c=>{const d=c.val();if(!open&&d.status==='waiting'&&d.uid!==ME.uid)open={key:c.key,...d};});
      if(open){
        await remove(ref(db,'queue/'+open.key));
        await joinMatch(open.matchId,'p2');
        return;
      }
    }
    const mid=push(ref(db,'matches')).key;
    const qRef=push(ref(db,'queue'));
    await set(qRef,{uid:ME.uid,matchId:mid,status:'waiting',ts:Date.now()});
    searchUnsub=qRef;
    await createMatch(mid,'p1');
  }catch(err){
    console.error(err);
    document.getElementById('playBtn').disabled=false;
    document.getElementById('srow').classList.remove('on');
    showToast('Erro ao buscar partida.');
  }
};
window.cancelSearch=async function(){
  if(searchUnsub){await remove(searchUnsub);searchUnsub=null;}
  document.getElementById('playBtn').disabled=false;
  document.getElementById('srow').classList.remove('on');
};

async function createMatch(mid,role){
  matchId=mid;myRole=role;
  const sp1=SPAWNS.p1,sp2=SPAWNS.p2;
  await set(ref(db,'matches/'+mid),{
    p1:{uid:ME.uid,nick:ME.nickname,hp:MAX_HP,x:sp1.x,y:sp1.y,ang:0,kills:0,alive:true},
    p2:{uid:'',nick:'',hp:MAX_HP,x:sp2.x,y:sp2.y,ang:0,kills:0,alive:true},
    bullets:{},status:'waiting',startedAt:0
  });
  showScreen('GS');
  initCanvas();
  document.getElementById('wOv').classList.add('on');
  document.getElementById('wId').textContent='ID: '+mid;
  listenMatch(mid);
}
async function joinMatch(mid,role){
  matchId=mid;myRole=role;
  await update(ref(db,'matches/'+mid+'/p2'),{uid:ME.uid,nick:ME.nickname});
  await update(ref(db,'matches/'+mid),{status:'active',startedAt:Date.now()});
  showScreen('GS');
  document.getElementById('srow').classList.remove('on');
  document.getElementById('playBtn').disabled=false;
  initCanvas();
  listenMatch(mid);
}

// ── Match listener ──
function listenMatch(mid){
  matchRef=ref(db,'matches/'+mid);
  matchUnsub=onValue(matchRef,snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    if(d.status==='active'){
      document.getElementById('wOv').classList.remove('on');
      if(!rafId)startLoop();
    }
    const enRole=myRole==='p1'?'p2':'p1';
    const en=d[enRole];
    if(en){
      G.en.hp=en.hp!=null?en.hp:MAX_HP;
      G.en.kills=en.kills||0;
      G.en.alive=en.alive!=null?en.alive:true;
      G.enS.x=en.x!=null?en.x:G.enS.x;
      G.enS.y=en.y!=null?en.y:G.enS.y;
      G.enS.ang=en.ang!=null?en.ang:G.enS.ang;
      if(en.nick)document.getElementById('hEnN').textContent=en.nick;
    }
    // enemy bullets
    G.bullets=G.bullets.filter(b=>b.own==='me');
    if(d.bullets){
      Object.entries(d.bullets).forEach(([id,b])=>{
        if(b.owner!==ME.uid)G.bullets.push({x:b.x,y:b.y,dx:b.dx,dy:b.dy,own:'en',id:id});
      });
    }
    // my hp from db (take damage)
    const myD=d[myRole];
    if(myD&&myD.hp!=null&&myD.hp<G.me.hp){G.me.hp=myD.hp;if(G.me.hp<=0){G.me.alive=false;}}
    if(d.status==='finished'&&!G.over){G.over=true;showEndScreen(d.winner===ME.uid);}
  });
}

// ── Canvas init ──
function initCanvas(){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  const sc=Math.min(window.innerWidth/MW,window.innerHeight/MH);
  canvas.width=Math.round(MW*sc);
  canvas.height=Math.round(MH*sc);
  ctx.scale(sc,sc);
  const sp=SPAWNS[myRole],esp=SPAWNS[myRole==='p1'?'p2':'p1'];
  G.me={x:sp.x,y:sp.y,ang:0,hp:MAX_HP,kills:0,ammo:MAX_AMMO,reloading:false,rTimer:0,alive:true,inBush:false};
  G.en={x:esp.x,y:esp.y,ang:0,hp:MAX_HP,kills:0,alive:true,inBush:false};
  G.enS={x:esp.x,y:esp.y,ang:0};
  G.bullets=[];G.over=false;FX.length=0;
  document.getElementById('hMyN').textContent=ME.nickname;
  document.addEventListener('keydown',onKey);
  document.addEventListener('keyup',onKey);
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect(),sc2=MW/canvas.width;
    G.mx=(e.clientX-r.left)*sc2;G.my=(e.clientY-r.top)*sc2;
  });
  canvas.addEventListener('mousedown',e=>{if(e.button===0)doShoot();});
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  initMobile();
}
function onKey(e){
  G.keys[e.code]=e.type==='keydown';
  if(e.type==='keydown'&&e.code==='KeyR')doReload();
}

// ── Game loop ──
let lastT=0;
function startLoop(){lastT=performance.now();rafId=requestAnimationFrame(loop);}
function loop(now){
  if(G.over){rafId=null;return;}
  const dt=Math.min((now-lastT)/16.67,3);lastT=now;
  tick(dt);draw();
  rafId=requestAnimationFrame(loop);
}

// ── Tick ──
function tick(dt){
  if(!G.me.alive)return;
  // Movement
  const spd=2.7*dt;let nx=G.me.x,ny=G.me.y;
  if(G.keys['KeyW']||G.keys['ArrowUp'])ny-=spd;
  if(G.keys['KeyS']||G.keys['ArrowDown'])ny+=spd;
  if(G.keys['KeyA']||G.keys['ArrowLeft'])nx-=spd;
  if(G.keys['KeyD']||G.keys['ArrowRight'])nx+=spd;
  if(joyOn&&(Math.abs(jDX)>.08||Math.abs(jDY)>.08)){nx+=jDX*spd*1.4;ny+=jDY*spd*1.4;}
  // Axis-separated collision
  if(!wallBlock(nx,G.me.y))G.me.x=nx;
  if(!wallBlock(G.me.x,ny))G.me.y=ny;
  G.me.x=clamp(G.me.x,PR+18,MW-PR-18);
  G.me.y=clamp(G.me.y,PR+18,MH-PR-18);
  // Aim
  if(!shootOn||!isTouch())G.me.ang=Math.atan2(G.my-G.me.y,G.mx-G.me.x);
  // Bush detection
  G.me.inBush=BUSHES.some(b=>Math.hypot(G.me.x-b.x,G.me.y-b.y)<b.r-4);
  G.en.inBush=BUSHES.some(b=>Math.hypot(G.enS.x-b.x,G.enS.y-b.y)<b.r-4);
  // Reload timer
  if(G.me.reloading){
    G.me.rTimer-=16.67*dt;
    if(G.me.rTimer<=0){
      G.me.reloading=false;G.me.ammo=MAX_AMMO;
      document.getElementById('hRl').style.display='none';
    }
  }
  // Bullets — sub-step for accurate wall collision
  for(let i=G.bullets.length-1;i>=0;i--){
    const b=G.bullets[i];let hit=false;
    for(let s=0;s<3&&!hit;s++){
      b.x+=b.dx*dt/3;b.y+=b.dy*dt/3;
      if(wallPt(b.x,b.y)||b.x<18||b.x>MW-18||b.y<18||b.y>MH-18){
        spawnFX(b.x,b.y);
        G.bullets.splice(i,1);
        if(b.fbId)remove(ref(db,'matches/'+matchId+'/bullets/'+b.fbId));
        hit=true;break;
      }
      if(b.own==='me'&&G.en.alive){
        if(Math.hypot(b.x-G.enS.x,b.y-G.enS.y)<PR+BR){
          spawnFX(b.x,b.y);
          G.bullets.splice(i,1);
          if(b.fbId)remove(ref(db,'matches/'+matchId+'/bullets/'+b.fbId));
          registerHit();hit=true;break;
        }
      }
      if(b.own==='en'&&G.me.alive){
        if(Math.hypot(b.x-G.me.x,b.y-G.me.y)<PR+BR){
          spawnFX(b.x,b.y);G.bullets.splice(i,1);hit=true;break;
        }
      }
    }
  }
  // Smooth enemy position
  const lf=0.2*dt;
  G.en.x+=(G.enS.x-G.en.x)*lf;
  G.en.y+=(G.enS.y-G.en.y)*lf;
  G.en.ang=G.enS.ang;
  // Particles
  for(let i=FX.length-1;i>=0;i--){FX[i].life-=dt;if(FX[i].life<=0)FX.splice(i,1);}
  // Sync
  const now=performance.now();
  if(now-G.lSync>50){G.lSync=now;syncMe();}
  updateHUD();
}

// ── Shoot ──
function doShoot(){
  if(G.over||!G.me.alive)return;
  if(G.me.reloading||G.me.ammo<=0){doReload();return;}
  G.me.ammo--;
  const sp=(Math.random()-.5)*.07,ang=G.me.ang+sp;
  const b={
    x:G.me.x+Math.cos(ang)*(PR+2),
    y:G.me.y+Math.sin(ang)*(PR+2),
    dx:Math.cos(ang)*BS,
    dy:Math.sin(ang)*BS,
    own:'me'
  };
  const fr=push(ref(db,'matches/'+matchId+'/bullets'));
  b.fbId=fr.key;
  set(fr,{x:b.x,y:b.y,dx:b.dx,dy:b.dy,owner:ME.uid,ts:Date.now()});
  setTimeout(()=>remove(fr),3000);
  G.bullets.push(b);
  if(G.me.ammo===0)doReload();
}
function doReload(){
  if(G.me.reloading||G.me.ammo===MAX_AMMO)return;
  G.me.reloading=true;G.me.rTimer=RELOAD_MS;
  document.getElementById('hRl').style.display='block';
}
function registerHit(){
  const er=myRole==='p1'?'p2':'p1';
  get(ref(db,'matches/'+matchId+'/'+er+'/hp')).then(s=>{
    const nh=Math.max(0,(s.val()!=null?s.val():MAX_HP)-34);
    update(ref(db,'matches/'+matchId+'/'+er),{hp:nh,alive:nh>0});
    if(nh<=0)onKill();
  });
}
function onKill(){
  G.me.kills++;
  const er=myRole==='p1'?'p2':'p1';
  const esp=SPAWNS[myRole==='p1'?'p2':'p1'];
  update(ref(db,'matches/'+matchId+'/'+er),{hp:MAX_HP,alive:true,x:esp.x,y:esp.y});
  update(ref(db,'matches/'+matchId+'/'+myRole),{kills:G.me.kills});
  const msp=SPAWNS[myRole];
  G.me.x=msp.x;G.me.y=msp.y;G.me.hp=MAX_HP;G.me.alive=true;G.me.ammo=MAX_AMMO;G.me.reloading=false;
  document.getElementById('hRl').style.display='none';
  if(G.me.kills>=KILLS_WIN)endMatch(true);
}
function syncMe(){
  if(!matchId||!myRole)return;
  update(ref(db,'matches/'+matchId+'/'+myRole),{
    x:Math.round(G.me.x),y:Math.round(G.me.y),
    ang:+G.me.ang.toFixed(3),
    hp:G.me.hp,kills:G.me.kills,alive:G.me.alive,nick:ME.nickname
  });
}
function spawnFX(x,y){
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*2.5;
    FX.push({x,y,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp,life:1,ml:1.2});
  }
}

// ── Draw ──
function draw(){
  ctx.clearRect(0,0,MW,MH);
  // Floor
  ctx.fillStyle='#111722';ctx.fillRect(0,0,MW,MH);
  // Grid lines
  ctx.strokeStyle='rgba(74,144,226,.04)';ctx.lineWidth=1;
  for(let x=0;x<MW;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,MH);ctx.stroke();}
  for(let y=0;y<MH;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(MW,y);ctx.stroke();}
  // Bush bottom layer
  BUSHES.forEach(b=>drawBush(b,false));
  // Walls
  WALLS.forEach(w=>drawWall(w));
  // Range indicator
  if(G.me.alive)drawRange(G.me.x,G.me.y,G.me.ang);
  // Bullets
  G.bullets.forEach(b=>{
    ctx.save();
    const isMe=b.own==='me';
    ctx.shadowColor=isMe?'#4a8fe2':'#e05050';ctx.shadowBlur=9;
    ctx.beginPath();ctx.arc(b.x,b.y,BR,0,Math.PI*2);
    ctx.fillStyle=isMe?'#7ab8ff':'#ff8888';ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=isMe?'rgba(122,184,255,.4)':'rgba(255,128,128,.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.dx*4,b.y-b.dy*4);ctx.stroke();
    ctx.restore();
  });
  // FX particles
  FX.forEach(p=>{
    const a=p.life/p.ml,t=1-p.life;
    ctx.beginPath();ctx.arc(p.x+p.dx*t*12,p.y+p.dy*t*12,2.5*a,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,100,'+a*.7+')';ctx.fill();
  });
  // Enemy
  if(G.en.alive){
    if(G.en.inBush){ctx.save();ctx.globalAlpha=.16;drawChar(G.en.x,G.en.y,G.en.ang,'#e05050',false);ctx.restore();}
    else drawChar(G.en.x,G.en.y,G.en.ang,'#e05050',false);
  }
  // Me
  if(G.me.alive){
    if(G.me.inBush){ctx.save();ctx.globalAlpha=.6;drawChar(G.me.x,G.me.y,G.me.ang,'#4a8fe2',true);ctx.restore();}
    else drawChar(G.me.x,G.me.y,G.me.ang,'#4a8fe2',true);
  }
  // Bush top layer (players appear inside)
  BUSHES.forEach(b=>drawBush(b,true));
}

function drawWall(w){
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.fillRect(w.x+3,w.y+3,w.w,w.h);
  // Body
  const g=ctx.createLinearGradient(w.x,w.y,w.x,w.y+w.h);
  g.addColorStop(0,'#374055');g.addColorStop(1,'#202535');
  ctx.fillStyle=g;ctx.fillRect(w.x,w.y,w.w,w.h);
  // Top highlight
  ctx.fillStyle='rgba(255,255,255,.05)';
  ctx.fillRect(w.x,w.y,w.w,Math.min(4,w.h));
  // Border
  ctx.strokeStyle='rgba(74,144,226,.13)';ctx.lineWidth=1;
  ctx.strokeRect(w.x+.5,w.y+.5,w.w-1,w.h-1);
}

function drawBush(b,top){
  if(!top){
    // Dark base
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle='rgba(14,32,14,.72)';ctx.fill();
    ctx.strokeStyle='rgba(34,130,48,.28)';ctx.lineWidth=2;ctx.stroke();
    // Inner blobs
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2,r2=b.r*(.3+Math.sin(i*1.7)*.24);
      ctx.beginPath();ctx.arc(b.x+Math.cos(a)*r2,b.y+Math.sin(a)*r2,5+Math.sin(i*2)*2,0,Math.PI*2);
      ctx.fillStyle='rgba('+(25+i*6)+','+(95+i*9)+','+(25+i*4)+',.6)';ctx.fill();
    }
  }else{
    // Top blades — create "inside" illusion
    for(let i=0;i<12;i++){
      const a=i/12*Math.PI*2,r2=b.r*(.46+Math.sin(i*1.4)*.3);
      const bx=b.x+Math.cos(a)*r2,by=b.y+Math.sin(a)*r2;
      ctx.beginPath();
      ctx.moveTo(bx,by);
      ctx.quadraticCurveTo(bx+Math.cos(a+.8)*4,by+Math.sin(a+.8)*4-6,bx+Math.cos(a)*2.5,by-9);
      ctx.strokeStyle='rgba('+(36+i*5)+','+(108+i*8)+','+(36+i*4)+',.68)';
      ctx.lineWidth=2.5;ctx.stroke();
    }
  }
}

function drawChar(x,y,ang,color,isMe){
  ctx.save();ctx.translate(x,y);
  // Ground shadow
  ctx.save();ctx.scale(1,.36);ctx.translate(0,PR+5);
  ctx.beginPath();ctx.arc(0,0,PR,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fill();ctx.restore();
  ctx.rotate(ang);
  // Legs
  const legC=isMe?'#1c2e4a':'#4a1818';
  ctx.fillStyle=legC;
  ctx.save();ctx.rotate(.28);ctx.beginPath();ctx.ellipse(0,11,4.5,6,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.rotate(-.28);ctx.beginPath();ctx.ellipse(0,11,4.5,6,0,0,Math.PI*2);ctx.fill();ctx.restore();
  // Body
  ctx.beginPath();ctx.arc(0,0,PR,0,Math.PI*2);
  const bg=ctx.createRadialGradient(-3,-3,1,0,0,PR);
  bg.addColorStop(0,isMe?'#385580':'#622020');
  bg.addColorStop(1,isMe?'#1a2a48':'#321010');
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2.2;ctx.stroke();
  // Vest straps
  ctx.strokeStyle=isMe?'rgba(180,210,255,.16)':'rgba(255,180,180,.16)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-7,-4);ctx.lineTo(7,4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(7,-4);ctx.lineTo(-7,4);ctx.stroke();
  // Helmet
  ctx.beginPath();ctx.arc(0,-1.5,7.5,Math.PI,0);
  ctx.fillStyle=isMe?'#4470aa':'#983030';ctx.fill();
  // Visor
  ctx.beginPath();ctx.arc(4,-2,4,Math.PI*1.1,Math.PI*1.9);
  ctx.strokeStyle=isMe?'rgba(170,220,255,.85)':'rgba(255,175,175,.85)';
  ctx.lineWidth=2.2;ctx.stroke();
  // Gun
  ctx.fillStyle=isMe?'#5598e0':'#c85858';
  ctx.beginPath();ctx.rect(5,-3.5,21,7);ctx.fill();
  // Gun highlight
  ctx.fillStyle=isMe?'rgba(180,220,255,.22)':'rgba(255,180,180,.22)';
  ctx.fillRect(5,-3.5,21,2.5);
  // Muzzle
  ctx.beginPath();ctx.arc(26,0,3,0,Math.PI*2);
  ctx.fillStyle=isMe?'#88c4ff':'#ff8888';ctx.fill();
  ctx.restore();
  // Nametag (world space, not rotated)
  const nick=isMe?ME.nickname:'?';
  ctx.font='bold 10px Inter';ctx.textAlign='center';
  const tw=Math.max(46,ctx.measureText(nick).width+14);
  ctx.fillStyle='rgba(0,0,0,.62)';
  ctx.fillRect(x-tw/2,y-PR-22,tw,14);
  ctx.fillStyle=color;
  ctx.fillText(nick,x,y-PR-11);
}

function drawRange(x,y,ang){
  const half=.14;let dist=RANGE;
  for(let i=1;i<=60;i++){
    const t=RANGE*(i/60),rx=x+Math.cos(ang)*t,ry=y+Math.sin(ang)*t;
    if(wallPt(rx,ry)||rx<18||rx>MW-18||ry<18||ry>MH-18){dist=RANGE*((i-1)/60);break;}
  }
  const sa=ang-half,ea=ang+half;
  ctx.save();
  ctx.beginPath();ctx.moveTo(x,y);ctx.arc(x,y,dist,sa,ea);ctx.closePath();
  ctx.fillStyle='rgba(74,144,226,.06)';ctx.fill();
  ctx.beginPath();ctx.arc(x,y,dist,sa,ea);
  ctx.strokeStyle='rgba(74,144,226,.28)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(sa)*dist,y+Math.sin(sa)*dist);
  ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(ea)*dist,y+Math.sin(ea)*dist);
  ctx.strokeStyle='rgba(74,144,226,.13)';ctx.lineWidth=1;ctx.stroke();
  ctx.setLineDash([5,5]);
  ctx.beginPath();
  ctx.moveTo(x+Math.cos(ang)*PR,y+Math.sin(ang)*PR);
  ctx.lineTo(x+Math.cos(ang)*dist,y+Math.sin(ang)*dist);
  ctx.strokeStyle='rgba(74,144,226,.4)';ctx.lineWidth=1.2;ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(x+Math.cos(ang)*dist,y+Math.sin(ang)*dist,4,0,Math.PI*2);
  ctx.fillStyle='rgba(74,144,226,.58)';ctx.fill();
  ctx.restore();
}

// ── Collision helpers ──
function wallBlock(x,y){return WALLS.some(w=>x+PR>w.x&&x-PR<w.x+w.w&&y+PR>w.y&&y-PR<w.y+w.h);}
function wallPt(x,y){return WALLS.some(w=>x>w.x&&x<w.x+w.w&&y>w.y&&y<w.y+w.h);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// ── HUD ──
function updateHUD(){
  document.getElementById('hMyH').textContent=Math.max(0,G.me.hp);
  document.getElementById('hMyB').style.width=Math.max(0,G.me.hp)+'%';
  const hp=G.me.hp/MAX_HP;
  document.getElementById('hMyB').style.background=hp>.5?'var(--green)':hp>.25?'var(--yellow)':'var(--red)';
  document.getElementById('hEnH').textContent=Math.max(0,G.en.hp);
  document.getElementById('hEnB').style.width=Math.max(0,G.en.hp)+'%';
  document.getElementById('hMyK').textContent=G.me.kills;
  document.getElementById('hEnK').textContent=G.en.kills;
  document.getElementById('hAm').textContent=G.me.ammo;
  updatePips();
}

// ── End match ──
async function endMatch(won){
  G.over=true;
  await update(ref(db,'matches/'+matchId),{status:'finished',winner:won?ME.uid:'other'});
  if(won){
    ME.trophies+=TROPHY_WIN;
    const ws=await get(ref(db,'users/'+ME.uid+'/wins'));
    await update(ref(db,'users/'+ME.uid),{trophies:ME.trophies,wins:(ws.val()||0)+1});
    localStorage.setItem('ms_session',JSON.stringify(ME));
  }else{
    const ls=await get(ref(db,'users/'+ME.uid+'/losses'));
    await update(ref(db,'users/'+ME.uid),{losses:(ls.val()||0)+1});
  }
  showEndScreen(won);
}
function showEndScreen(won){
  stopGame();
  document.getElementById('eT').textContent=won?'VITÓRIA!':'DERROTA';
  document.getElementById('eT').className='ovt '+(won?'win':'lose');
  document.getElementById('eS').textContent=won?'Você eliminou o inimigo 3 vezes!':'Você foi eliminado 3 vezes.';
  document.getElementById('eTr').textContent=won?'+'+TROPHY_WIN+' 🏆 Troféus':'Nenhum troféu ganho';
  document.getElementById('eOv').classList.add('on');
}
window.backToLobby=function(){
  document.getElementById('eOv').classList.remove('on');
  stopGame();enterLobby();
};
function stopGame(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(matchUnsub&&matchRef){off(matchRef);matchUnsub=null;}
  document.removeEventListener('keydown',onKey);
  document.removeEventListener('keyup',onKey);
  matchId=null;myRole=null;matchRef=null;
}

// ── Mobile controls ──
const isTouch=()=>window.matchMedia('(pointer:coarse)').matches;
let joyOn=false,jDX=0,jDY=0,shootOn=false,sDX=0,sDY=0,shootInterval=null;

function initMobile(){
  if(!isTouch())return;
  const jz=document.getElementById('jz'),jk=document.getElementById('jknob');
  const sz=document.getElementById('sz'),sk=document.getElementById('sknob');
  let jx=0,jy=0,sx=0,sy=0;
  const JR=41,SR=47;
  jz.addEventListener('touchstart',e=>{
    e.preventDefault();const t=e.changedTouches[0];
    const r=jz.getBoundingClientRect();jx=r.left+r.width/2;jy=r.top+r.height/2;joyOn=true;
  },{passive:false});
  jz.addEventListener('touchmove',e=>{
    e.preventDefault();if(!joyOn)return;
    const t=e.changedTouches[0];let dx=t.clientX-jx,dy=t.clientY-jy;
    const d=Math.hypot(dx,dy);if(d>JR){dx=dx/d*JR;dy=dy/d*JR;}
    jDX=dx/JR;jDY=dy/JR;
    jk.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  },{passive:false});
  const ej=()=>{joyOn=false;jDX=0;jDY=0;jk.style.transform='translate(-50%,-50%)';};
  jz.addEventListener('touchend',ej);jz.addEventListener('touchcancel',ej);
  sz.addEventListener('touchstart',e=>{
    e.preventDefault();const t=e.changedTouches[0];
    const r=sz.getBoundingClientRect();sx=r.left+r.width/2;sy=r.top+r.height/2;shootOn=true;
    aimTouch(t.clientX,t.clientY,sk,sx,sy,SR);doShoot();
    shootInterval=setInterval(()=>{if(shootOn)doShoot();},220);
  },{passive:false});
  sz.addEventListener('touchmove',e=>{
    e.preventDefault();if(!shootOn)return;
    aimTouch(e.changedTouches[0].clientX,e.changedTouches[0].clientY,sk,sx,sy,SR);
  },{passive:false});
  const es=()=>{shootOn=false;sDX=0;sDY=0;sk.style.transform='translate(-50%,-50%)';clearInterval(shootInterval);shootInterval=null;};
  sz.addEventListener('touchend',es);sz.addEventListener('touchcancel',es);
}
function aimTouch(cx,cy,sk,sx,sy,SR){
  let dx=cx-sx,dy=cy-sy;const d=Math.hypot(dx,dy);
  if(d>SR){dx=dx/d*SR;dy=dy/d*SR;}
  sk.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  if(d>8)G.me.ang=Math.atan2(dy/SR,dx/SR);
  G.mx=G.me.x+Math.cos(G.me.ang)*100;G.my=G.me.y+Math.sin(G.me.ang)*100;
}
window.mobileReload=function(){doReload();};
function updatePips(){
  if(!isTouch())return;
  const el=document.getElementById('mpips');if(!el)return;
  el.innerHTML='';
  for(let i=0;i<MAX_AMMO;i++){
    const p=document.createElement('div');
    p.className='pip'+(i>=G.me.ammo?' e':'');
    el.appendChild(p);
  }
}

// ── Session restore ──
const saved=localStorage.getItem('ms_session');
if(saved){
  try{
    ME=JSON.parse(saved);
    get(ref(db,'users/'+ME.uid)).then(s=>{
      if(s.exists()){ME.trophies=s.val().trophies||0;enterLobby();}
      else{localStorage.removeItem('ms_session');ME=null;}
    }).catch(()=>{localStorage.removeItem('ms_session');ME=null;});
  }catch(e){localStorage.removeItem('ms_session');ME=null;}
}
